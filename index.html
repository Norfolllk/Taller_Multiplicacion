<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas de Multiplicar</title>
    <link rel="stylesheet" href="multiplicar.css">
</head>
<body>

    <header>
        <h1>✖️ Tablas de Multiplicar ✖️</h1>
        <p class="subtitulo">Ingresa un número y genera su tabla al instante</p>
    </header>

    <main>

        <section class="controles">
            <label for="numeroInput">🔢 Número de la tabla:</label>
            <input
                type="number"
                id="numeroInput"
                min="1"
                max="100"
                placeholder="Ej: 5"
            />
            
            <button onclick="generarTablas()">PROBAR</button>
        </section>

        <p class="ayuda">💡 Escribe cualquier número y presiona <strong>PROBAR</strong></p>
        <section id="contenedor" class="tabla-contenedor">
            <div class="fila">3 × 1 = 3</div>
            <div class="fila">3 × 2 = 6</div>
            <div class="fila">3 × 3 = 9</div>
            <div class="fila">3 × 4 = 12</div>
            <div class="fila">3 × 5 = 15</div>
            <div class="fila">3 × 6 = 18</div>
            <div class="fila">3 × 7 = 21</div>
            <div class="fila">3 × 8 = 24</div>
            <div class="fila">3 × 9 = 27</div>
            <div class="fila">3 × 10 = 30</div>
        </section>

    </main>

    <footer>
        <p>Creado por: Alexander Garofalo</p>
    </footer>
    <script src="multiplicar.js"></script>

</body>
</html>
